name: .NET CI

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '7.0.x'
        
- name: Restore
  run: dotnet restore CyberSecurityChatbot/CyberSecurityChatbot.csproj

- name: Build
  run: dotnet build CyberSecurityChatbot/CyberSecurityChatbot.csproj --configuration Release --no-restore

